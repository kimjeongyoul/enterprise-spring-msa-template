server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: gateway-service
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/api/v1/orders/**

jwt:
  secret: ${JWT_SECRET:globalauthsystemsecretkeyglobalauthsystemsecretkeyglobalauthsystemsecretkey}
