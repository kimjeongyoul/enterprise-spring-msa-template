kind: Secret
metadata:
  name: auth-service-secret
type: Opaque
data:
  # 'my-super-secret-key-12345678901234567890'를 Base64 인코딩한 값
  JWT_SECRET_KEY: bXktc3VwZXItc2VjcmV0LWtleS0xMjM0NTY3ODkwMTIzNDU2Nzg5MA==
  DB_PASSWORD: cGFzc3dvcmQ= # 'password'
